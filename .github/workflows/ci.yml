name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Tests (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh

      - name: Install bats-core (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Install bats-core (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Configure git identity (required for test repos)
        run: |
          git config --global user.email "ci@wt.test"
          git config --global user.name "CI"

      - name: Run unit tests
        run: bats tests/unit.bats

      - name: Run integration tests
        run: bats tests/integration.bats
